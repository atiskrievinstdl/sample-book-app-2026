name: 'Run API tests against Sample Book App'
description: 'Run API tests against Sample Book App inside docker contaienr'
inputs:
  environment:
    description: 'Environment where to run Sample Book App tests against'
    required: true
runs:
  using: composite
  steps:
    - name: Pull api-tests docker image
      run: docker pull atiskrievinstdl/api-tests
      shell: bash
    - name: Run API tests
      run: docker run --rm --network sample-book-app-compose-network -v $PWD/test-reports:/api-tests/mochawesome-report mtararujs/api-tests run BOOKS BOOKS_${{ inputs.environment }}
      shell: bash
    - uses: actions/upload-artifact@v7
      with:
        name: 'api-test-report'
        path: test-reports