name: 'Deploy Docker Image'
description: 'Deplot Sample Book App using docker compose'
inputs:
  environment:
    description: 'Environment where to deploy Sample Book App'
    required: true
runs:
  using: composite
  steps:
    - name: Pull sample-book-app docker image
      run: docker pull atiskrievinstdl/sample-book-app
      shell: bash
    - name: Stop and remove existing service container
      run: docker compose down sample-book-app-${{ inputs.environment }}
      shell: bash
    - name: Start service container for sample-book-app
      run: docker compose up -d sample-book-app-${{ inputs.environment }}
      shell: bash